<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Lookout - Frontal Sunset</title>
    <style>
        body { margin: 0; overflow: hidden; background: linear-gradient(to bottom, #1a1a2e 0%, #ff7e5f 100%); }
        #hiddenCanvas { display: none; }
        /* High-quality video vignette */
        body::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(20, 10, 0, 0.7) 100%);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="hiddenCanvas" width="800" height="200"></canvas>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0xff7e5f, 0.006); // Sunset haze

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- SUNSET LIGHTING ---
        const sun = new THREE.DirectionalLight(0xffccaa, 1.8);
        sun.position.set(0, 20, 100); // Light hitting the cliff face directly
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0x332244, 0.5));

        // --- THE CLIFF (FACING US) ---
        const cliffGeo = new THREE.BoxGeometry(150, 100, 80, 40, 40, 40);
        const pos = cliffGeo.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            let z = pos.getZ(i);
            if (z > 35) { // Deform the side facing the camera
                pos.setZ(i, z + (Math.random() - 0.5) * 15);
                pos.setY(i, pos.getY(i) + (Math.random() - 0.5) * 5);
            }
        }
        cliffGeo.computeVertexNormals();
        const cliff = new THREE.Mesh(cliffGeo, new THREE.MeshStandardMaterial({ color: 0x1a1512, roughness: 0.9 }));
        cliff.position.set(0, -50, -40); // Pushed back so the edge is center-screen
        scene.add(cliff);

        // --- THE TRUCK (DRIVING TOWARDS US) ---
        const truck = new THREE.Group();
        const tBody = new THREE.Mesh(new THREE.BoxGeometry(3, 2, 5), new THREE.MeshStandardMaterial({color: 0x050505}));
        truck.add(tBody);
        truck.position.set(0, 1, -80); // Starts deep in the background
        scene.add(truck);

        const rocket = new THREE.Mesh(
            new THREE.SphereGeometry(0.5, 12, 12),
            new THREE.MeshBasicMaterial({ color: 0xffffff })
        );
        rocket.visible = false;
        scene.add(rocket);

        // Camera positioned to look at the cliff edge
        camera.position.set(0, 15, 60);
        camera.lookAt(0, 10, 0);

        // --- PARTICLE LOGIC ---
        const textPoints = [];
        function initText() {
            const canvas = document.getElementById('hiddenCanvas');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = "white";
            ctx.font = "bold 70px Arial";
            ctx.fillText("HAPPY BIRTHDAY", 20, 100);
            
            const imgData = ctx.getImageData(0, 0, 800, 200).data;
            for (let y = 0; y < 200; y += 4) {
                for (let x = 0; x < 800; x += 4) {
                    if (imgData[((y * 800) + x) * 4 + 3] > 128) {
                        textPoints.push({
                            x: (x - 400) / 7,
                            y: (100 - y) / 7 + 35
                        });
                    }
                }
            }
        }
        initText();

        const geo = new THREE.BufferGeometry();
        const posArr = new Float32Array(textPoints.length * 3);
        const vels = [];
        for(let i=0; i<textPoints.length; i++) {
            posArr[i*3] = 0; posArr[i*3+1] = 1; posArr[i*3+2] = -40;
            vels.push(new THREE.Vector3());
        }
        
        geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
        const sparks = new THREE.Points(geo, new THREE.PointsMaterial({ 
            color: 0xffcc33, 
            size: 1.0, 
            transparent: true,
            blending: THREE.AdditiveBlending 
        }));
        sparks.visible = false;
        scene.add(sparks);

        // --- ANIMATION ---
        let state = "driving";
        let rVel = new THREE.Vector3(0, 2.2, 0.8); // Shoots UP and slightly TOWARDS camera
        let boomTime = 0;

        function animate() {
            requestAnimationFrame(animate);
            const positions = geo.attributes.position;

            if (state === "driving") {
                truck.position.z += 0.45; // Moves towards camera
                if (truck.position.z >= -2) { // Stop right at the cliff edge
                    state = "launching";
                    rocket.position.copy(truck.position);
                    rocket.visible = true;
                }
            } else if (state === "launching") {
                rocket.position.add(rVel);
                rVel.y -= 0.03; // Gravity
                if (rVel.y <= 0) {
                    state = "exploding";
                    rocket.visible = false;
                    sparks.visible = true;
                    boomTime = Date.now();
                    for(let i=0; i<textPoints.length; i++) {
                        positions.setXYZ(i, rocket.position.x, rocket.position.y, rocket.position.z);
                        vels[i].set((Math.random()-0.5)*6, (Math.random()-0.5)*6, (Math.random()-0.5)*6);
                    }
                }
            } else if (state === "exploding") {
                const elapsed = Date.now() - boomTime;
                for(let i=0; i<textPoints.length; i++) {
                    let px = positions.getX(i), py = positions.getY(i), pz = positions.getZ(i);
                    
                    if (elapsed < 2000) {
                        px += vels[i].x; py += vels[i].y; pz += vels[i].z;
                        vels[i].y -= 0.02;
                        vels[i].multiplyScalar(0.98);
                    } else {
                        const target = textPoints[i];
                        px += (target.x - px) * 0.07;
                        py += (target.y - py) * 0.07;
                        pz += (5 - pz) * 0.07; // Move letters close to camera view
                    }
                    positions.setXYZ(i, px, py, pz);
                }
                positions.needsUpdate = true;
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
